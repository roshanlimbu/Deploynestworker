services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "8000:80"
      - "127.0.0.1:2019:2019"
    volumes:
      - ./Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  caddy_data:
  caddy_config:
